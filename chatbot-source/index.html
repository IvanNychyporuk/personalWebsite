<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivan — Application Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'burning-orange': {
                '50':  '#F2EAE0', // page bg — warm linen
                '100': '#E4D0B4', // subtle border/bg
                '200': '#D4B880', // slightly deeper
                '300': '#C4A060', // mid amber
                '400': '#B07830', // --tm
                '500': '#D4903A', // --accent (primary)
                '600': '#B07830', // --ts darker
                '700': '#8A5A20',
                '800': '#5A3A10',
                '900': '#3A2200',
                '950': '#2A1600', // --tp darkest
              },
              primary:   '#D4903A', // --accent
              secondary: '#B07830', // --tm
              accent:    '#2A1600', // --tp (used for dark overlays/buttons)
              slate: {
                '300': '#C8A870',
                '400': '#B07830',
                '500': '#7A5020',
                '600': '#7A5020',
                '700': '#5A3A10',
                '800': '#3A2200',
                '900': '#2A1600',
              },
            },
            fontFamily: {
              sans: ['IBM Plex Sans', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'IBM Plex Sans', sans-serif; }
      /* Custom scrollbar for chat */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.8); opacity: 0.5; }
        100% { transform: scale(2); opacity: 0; }
      }
      .animate-pulse-ring {
        animation: pulse-ring 1.5s cubic-bezier(0.24, 0, 0.38, 1) infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",

}
</script>
